name: battenbook
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  battenbook:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Batten Book - Model Building Log
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.modelbuildlog
        PRODUCT_NAME: Batten Book - Model Building Log
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
    scheme:
      testTargets:
        - battenbookTests
        - battenbookUITests
  battenbookTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: battenbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.modelbuildlog.tests
        GENERATE_INFOPLIST_FILE: true
  battenbookUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: battenbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.modelbuildlog.uitests
        GENERATE_INFOPLIST_FILE: true
